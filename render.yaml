services:
  - type: web
    name: blessyou-sneeze-bot
    env: python
    plan: free
    autoDeploy: false
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn asgi:web_app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: DATABASE_NAME
        value: blessyou_bot
      - key: BOT_MODE
        value: webhook
      - key: WEBHOOK_PATH
        value: /telegram/webhook
      - key: DEFAULT_UNBLESS_PENALTY
        value: "1"
      - key: SCOREBOARD_LIMIT
        value: "10"
      - key: LOG_LEVEL
        value: INFO
